name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: pivovarit/gofmt-action@main

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags="-s -w" -trimpath -o tgh .

      - name: Test
        run: go test ./...
