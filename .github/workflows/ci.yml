name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Format
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            echo ""
            ESC=$(printf '\033')
            gofmt -d . | sed "s/^+.*/${ESC}[32m&${ESC}[0m/;s/^-.*/${ESC}[31m&${ESC}[0m/;s/^@@.*/${ESC}[36m&${ESC}[0m/"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags="-s -w" -trimpath -o tgh .

      - name: Test
        run: go test ./...
